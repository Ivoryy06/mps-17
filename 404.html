<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 – Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: url("pictures/background.jpg") center/cover no-repeat fixed;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; padding: 2rem; }
    h1 { font-size: 6rem; font-weight: 800; opacity: 0.9; }
    p { font-size: 1.1rem; color: rgba(255,255,255,0.65); margin: 0.5rem 0 2rem; }
    a {
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      text-decoration: none;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
    }
    a:hover { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>Page not found</p>
    <a href="index.html">← Go Home</a>
  </div>
</body>
</html>
