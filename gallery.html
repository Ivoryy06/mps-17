<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery – Marsudirini Photography Students</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/pagehome.css">
  <style>
    body {
      min-height: 100vh;
      background: url("pictures/background.jpg") center/cover no-repeat fixed;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 1.5rem 3rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-header h1 { font-size: 2.2rem; margin-bottom: 0.4rem; }
    .page-header p  { color: rgba(255,255,255,0.7); font-size: 1rem; }

    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      font-size: 0.9rem;
      color: #fff;
      text-decoration: none;
      transition: background 0.2s;
    }
    .back-link:hover { background: rgba(0,0,0,0.6); }

    /* Filter tabs */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .filter-bar button,
    .filter-btn {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    .filter-bar button:hover,
    .filter-bar button.active,
    .filter-btn:hover,
    .filter-btn.active {
      background: rgba(255,255,255,0.3);
    }

    /* Masonry grid */
    .masonry {
      column-count: 4;
      column-gap: 1rem;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(6px);
    }

    .masonry-item iframe {
      width: 100%;
      min-height: 320px;
      border: none;
      display: block;
    }

    .masonry-item .member-label {
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
      text-align: center;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
    }

    /* Responsive */
    @media (max-width: 1024px) { .masonry { column-count: 3; } }
    @media (max-width: 768px)  { .masonry { column-count: 2; } }
    @media (max-width: 480px) {
      .masonry { column-count: 1; }
      .page-header h1 { font-size: 1.5rem; }
      .page-wrap { padding: 4rem 1rem 2rem; }
    }
  </style>
</head>
<body>

  <div class="page-wrap">
    <a href="index.html" class="back-link">← Home</a>

    <div class="page-header">
      <h1>Gallery</h1>
      <p>Works from all Marsudirini Photography Students members</p>
    </div>

    <!-- Gen filter -->
    <div class="filter-bar" id="gen-filter-bar"></div>

    <!-- Member filter (optional) -->
    <div class="filter-bar" id="member-filter-bar" style="margin-top:-1rem;"></div>

    <div class="masonry" id="masonry"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" alt="">
  </div>

  <button onclick="window.scrollTo({top:0,behavior:'smooth'})" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:999px;padding:0.5rem 0.9rem;cursor:pointer;backdrop-filter:blur(6px);font-size:0.9rem;">↑ Top</button>

  <footer style="text-align:center;padding:2rem;color:rgba(255,255,255,0.35);font-size:0.8rem;position:relative;z-index:1;">
    © 2026 Marsudirini Photography Students · Made by <a href="https://github.com/Ivoryy06" target="_blank" style="color:rgba(255,255,255,0.5);text-decoration:none;">Ivory</a>
  </footer>

  <script>
    let activeGen = "all";
    let activeMember = "all";

    fetch("members.json")
      .then(r => r.json())
      .then(members => {
        const masonry = document.getElementById("masonry");
        const genBar = document.getElementById("gen-filter-bar");
        const memberBar = document.getElementById("member-filter-bar");

        // Gen filter buttons
        const gens = ["all", ...new Set(members.map(m => m.gen).sort())];
        gens.forEach(g => {
          const btn = document.createElement("button");
          btn.textContent = g === "all" ? "All Gens" : `Angkatan ${g}`;
          btn.className = "filter-btn" + (g === "all" ? " active" : "");
          btn.addEventListener("click", () => {
            genBar.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeGen = g;
            activeMember = "all";
            // Reset member filter
            memberBar.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            memberBar.querySelector("[data-member='all']").classList.add("active");
            applyFilter();
          });
          btn.dataset.gen = g;
          genBar.appendChild(btn);
        });

        // Member filter buttons
        const allMemberBtn = document.createElement("button");
        allMemberBtn.textContent = "All Members";
        allMemberBtn.className = "filter-btn active";
        allMemberBtn.dataset.member = "all";
        allMemberBtn.addEventListener("click", () => {
          memberBar.querySelectorAll("button").forEach(b => b.classList.remove("active"));
          allMemberBtn.classList.add("active");
          activeMember = "all";
          applyFilter();
        });
        memberBar.appendChild(allMemberBtn);

        members.forEach(m => {
          const btn = document.createElement("button");
          btn.textContent = m.name;
          btn.dataset.member = m.name;
          btn.className = "filter-btn";
          btn.addEventListener("click", () => {
            memberBar.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeMember = m.name;
            applyFilter();
          });
          memberBar.appendChild(btn);
        });

        const FALLBACK_PHOTO = "pictures/member5/m5photo.jpg";

        // Build masonry items
        members.forEach(m => {
          const item = document.createElement("div");
          item.className = "masonry-item";
          item.dataset.member = m.name;
          item.dataset.gen = m.gen;

          if (m.widget) {
            item.innerHTML = `
              <iframe src="https://snapwidget.com/embed/${m.widget}"
                allowtransparency="true" frameborder="0" scrolling="no"
                title="${m.name}'s posts"></iframe>
              <div class="member-label">${m.name} · Gen ${m.gen}</div>
            `;
          } else if (m.gen === 16 || m.gen === 18) {
            item.innerHTML = `
              <div style="min-height:180px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0.5rem;padding:2rem;opacity:0.5;">
                <span style="font-size:2rem;">📷</span>
                <span style="font-size:0.9rem;">Coming Soon</span>
              </div>
              <div class="member-label">${m.name}</div>
            `;
          } else {
            // Gen 17 – show Linggar's photo as placeholder
            const photo = m.photo || FALLBACK_PHOTO;
            item.innerHTML = `
              <img src="${photo}" alt="${m.name}" style="width:100%;display:block;object-fit:cover;">
              <div class="member-label">${m.name} · Gen ${m.gen}</div>
            `;
          }

          masonry.appendChild(item);
        });

        function applyFilter() {
          document.querySelectorAll(".masonry-item").forEach(item => {
            const genMatch = activeGen === "all" || item.dataset.gen === String(activeGen);
            const memberMatch = activeMember === "all" || item.dataset.member === activeMember;
            item.style.display = (genMatch && memberMatch) ? "" : "none";
          });
        }
      });

    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    document.addEventListener("click", e => {
      if (e.target.matches(".masonry-item img")) {
        lightbox.style.display = "flex";
        lightboxImg.src = e.target.src;
      }
    });
    lightbox.addEventListener("click", () => { lightbox.style.display = "none"; });
  </script>

</body>
</html>
