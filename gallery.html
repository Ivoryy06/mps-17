<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery – Marsudirini Photography Students</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/pagehome.css">
  <style>
    body {
      min-height: 100vh;
      background: url("pictures/background.jpg") center/cover no-repeat fixed;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 1.5rem 3rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-header h1 { font-size: 2.2rem; margin-bottom: 0.4rem; }
    .page-header p  { color: rgba(255,255,255,0.7); font-size: 1rem; }

    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      font-size: 0.9rem;
      color: #fff;
      text-decoration: none;
      transition: background 0.2s;
    }
    .back-link:hover { background: rgba(0,0,0,0.6); }

    /* Filter tabs */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .filter-bar button {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    .filter-bar button:hover,
    .filter-bar button.active {
      background: rgba(255,255,255,0.3);
    }

    /* Masonry grid */
    .masonry {
      column-count: 4;
      column-gap: 1rem;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(6px);
    }

    .masonry-item iframe {
      width: 100%;
      min-height: 320px;
      border: none;
      display: block;
    }

    .masonry-item .member-label {
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
      text-align: center;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
    }

    /* Responsive */
    @media (max-width: 1024px) { .masonry { column-count: 3; } }
    @media (max-width: 768px)  { .masonry { column-count: 2; } }
    @media (max-width: 480px) {
      .masonry { column-count: 1; }
      .page-header h1 { font-size: 1.5rem; }
      .page-wrap { padding: 4rem 1rem 2rem; }
    }
  </style>
</head>
<body>

  <div class="page-wrap">
    <a href="index.html" class="back-link">← Home</a>

    <div class="page-header">
      <h1>Gallery</h1>
      <p>Works from all Marsudirini Photography Students members</p>
    </div>

    <div class="filter-bar" id="filter-bar">
      <button class="active" data-filter="all">All</button>
    </div>

    <div class="masonry" id="masonry"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" alt="">
  </div>

  <script>
    fetch("members.json")
      .then(r => r.json())
      .then(members => {
        const masonry = document.getElementById("masonry");
        const filterBar = document.getElementById("filter-bar");

        // Build filter buttons
        members.forEach(m => {
          const btn = document.createElement("button");
          btn.textContent = m.name;
          btn.dataset.filter = m.name;
          btn.addEventListener("click", () => setFilter(m.name, btn));
          filterBar.appendChild(btn);
        });

        // Build masonry items
        members.forEach(m => {
          if (!m.widget) return;
          const item = document.createElement("div");
          item.className = "masonry-item";
          item.dataset.member = m.name;
          item.innerHTML = `
            <iframe src="https://snapwidget.com/embed/${m.widget}"
              allowtransparency="true" frameborder="0" scrolling="no"
              title="${m.name}'s posts"></iframe>
            <div class="member-label">${m.name} · ${m.role}</div>
          `;
          masonry.appendChild(item);
        });

        function setFilter(filter, activeBtn) {
          document.querySelectorAll(".filter-bar button").forEach(b => b.classList.remove("active"));
          activeBtn.classList.add("active");
          document.querySelectorAll(".masonry-item").forEach(item => {
            item.style.display = (filter === "all" || item.dataset.member === filter) ? "" : "none";
          });
        }

        document.querySelector("[data-filter='all']").addEventListener("click", function() {
          setFilter("all", this);
        });
      });

    // Lightbox for any images
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    document.addEventListener("click", e => {
      if (e.target.matches(".masonry-item img")) {
        lightbox.style.display = "flex";
        lightboxImg.src = e.target.src;
      }
    });
    lightbox.addEventListener("click", () => { lightbox.style.display = "none"; });
  </script>

</body>
</html>
