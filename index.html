<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://snapwidget.com/js/snapwidget.js" defer></script>
  <meta charset="UTF-8">
  <title>Marsudirini Photography Students</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/pagehome.css?v=7">

  <style>
    /* ==============================
       1. CORE RESET & BASE STYLES
       ============================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      background-color: #111;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ==============================
       2. HERO SECTION
       ============================== */
    .hero {
      /* Default Desktop Height */
      min-height: 70vh; 
      position: relative;
      /* Ensure you have a valid image here or a fallback color */
      background: url("pictures/background.jpg") center/cover no-repeat;
      background-color: #222; /* Fallback if image missing */
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1;
    }

    /* Header Styling */
    .hero header {
      position: relative;
      z-index: 2;
      margin-bottom: 1rem;
      /* Added margin top to ensure it doesn't hit the top edge on mobile */
      margin-top: 2rem; 
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      animation: fadeSlideDown 0.8s ease both;
    }

    .hero p {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.85);
      animation: fadeSlideDown 0.8s ease 0.2s both;
    }

    .gen-filter {
      animation: fadeSlideDown 0.8s ease 0.4s both;
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ==============================
       3. NAVIGATION (Desktop & Mobile)
       ============================== */
    
    /* Desktop Nav Links */
    .hero-links {
      position: absolute;
      top: 1.2rem;
      right: 1.5rem;
      display: flex;
      gap: 0.75rem;
      z-index: 3;
    }

    .hero-links a {
      padding: 0.4rem 0.8rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      transition: background 0.2s ease;
    }

    .hero-links a:hover {
      background: rgba(0,0,0,0.55);
      opacity: 0.8;
    }

    /* Hamburger Icon */
    .hamburger {
      font-size: 2rem;
      color: white;
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      cursor: pointer;
      z-index: 10;
    }

    /* Mobile Menu Overlay */
    .mobile-menu {
      display: none; /* Hidden by default */
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      z-index: 9;
    }

    .mobile-menu a {
      font-size: 2rem;
      color: white;
    }

    /* UI Toggles */
    .desktop-ui { display: block; }
    .mobile-ui { display: none; }

    /* ==============================
       4. TEAM MEMBERS LAYOUT
       ============================== */
    .team {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 2rem;
      width: 100%;
    }

    .team h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .team ul {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      width: 100%;
      max-width: 1100px;
      padding: 0 1.5rem;
    }

    .team li {
      background: rgba(0,0,0,0.55);
      color: white;
      padding: 1rem;
      border-radius: 10px;
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .team li img {
      width: 100%;
      border-radius: 6px;
      margin-top: 0.5rem;
    }

    .team li:hover {
      transform: translateY(-8px); 
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
    }

    /* ==============================
       5. WIDGETS & CAROUSEL
       ============================== */
    .insta-single {
      width: 100%;
      margin-top: 0.5rem;
      border-radius: 6px;
      overflow: hidden;
      line-height: 0;
    }
    .insta-single iframe {
      width: 100% !important;
      min-height: 320px;
      border: 0;
      display: block;
    }

    .insta-carousel {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding: 0.5rem 0;
      scroll-snap-type: x mandatory;
      width: 100%; /* Ensure it fits container */
    }

    .insta-carousel img {
      width: 100px; /* Adjusted for card size */
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
      flex: 0 0 auto;
      scroll-snap-align: start;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .insta-carousel img:hover {
      transform: scale(1.05);
    }

    /* ==============================
       6. UTILITIES (Bio, Lazy, Lightbox)
       ============================== */
    .gen-filter {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 0.8rem;
      flex-wrap: wrap;
    }

    .gen-btn {
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    .gen-btn:hover { background: rgba(255,255,255,0.22); }
    .gen-btn.active { background: rgba(255,255,255,0.35); font-weight: 600; }

    .skeleton-card {
      background: rgba(255,255,255,0.05) !important;
      pointer-events: none;
    }
    .skel {
      background: linear-gradient(90deg, rgba(255,255,255,0.07) 25%, rgba(255,255,255,0.13) 50%, rgba(255,255,255,0.07) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    .skel-title { height: 1.2rem; width: 60%; margin: 0 auto 0.8rem; }
    .skel-img   { height: 160px; width: 100%; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .bio {
      display: none;
      margin-top: 0.75rem;
      font-size: 0.9rem;
      color: #ddd;
    }

    .bio-socials {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 0.6rem;
      flex-wrap: wrap;
    }

    .bio-socials a {
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 0.8rem;
      text-decoration: none;
      transition: background 0.2s;
    }

    .bio-socials a:hover { background: rgba(255,255,255,0.25); }

    .toggle-bio {
      margin-top: 0.5rem;
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      border-radius: 5px;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
    }

    .lazy {
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .lazy.loaded {
      opacity: 1;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
    }

    /* ==============================
       7. RESPONSIVE / MEDIA QUERIES
       ============================== */
    
    @media (max-width: 768px) {
      .team ul {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      /* === CRITICAL FIX FOR GAP === */
      .hero {
        min-height: auto; /* Remove fixed height */
        padding-bottom: 3rem;
      }

      .desktop-ui { display: none; }
      .mobile-ui { display: block; }
      
      .team ul {
        grid-template-columns: 1fr;
      }
      
      .hero h1 {
        font-size: 1.8rem; /* Smaller font for mobile */
      }
    }
  </style>
</head>

<body>

<section class="hero">

  <header>
    <h1>Marsudirini Photography Students</h1>
    <p>Portfolio anggota MPS angkatan: <span id="active-gen">17</span></p>
    <div class="gen-filter" id="gen-filter">
      <button class="gen-btn active" data-gen="17">Angkatan 17</button>
      <button class="gen-btn" data-gen="18">Angkatan 18</button>
    </div>
  </header>

  <div class="desktop-ui">
    <nav class="hero-links">
      <a href="credits.html">Credits</a>
      <a href="about.html">About</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
      <button id="theme-toggle" title="Toggle theme">🌙</button>
    </nav>
  </div>

  <div class="mobile-ui">
    <div class="hamburger" id="hamburger">&#9776;</div>
    <div class="mobile-menu" id="mobile-menu">
      <a href="credits.html">Credits</a>
      <a href="about.html">About</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <div class="team">
    <h2>TEAM MEMBERS <span id="member-count" class="member-count"></span></h2>
    <input type="text" id="search" placeholder="Search member..." class="search-box" oninput="filterMembers()">

    <ul id="member-list">
      <!-- populated by JS from members.json -->
    </ul>
  </div>

</section>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img" alt="Zoomed Image">
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* Skeleton placeholders */
  const ul = document.getElementById("member-list");
  ul.innerHTML = Array(6).fill(`<li class="skeleton-card"><div class="skel skel-title"></div><div class="skel skel-img"></div></li>`).join("");

  /* Load members from JSON */
  fetch("members.json")
    .then(r => r.json())
    .then(members => {
      ul.innerHTML = members.map(m => `
        <li data-link="${m.page}" data-gen="${m.gen || 17}">
          <h3>${m.name}<br>${m.role}</h3>
          ${m.widget ? `<div class="insta-single"><iframe src="https://snapwidget.com/embed/${m.widget}" class="snapwidget-widget" allowtransparency="true" frameborder="0" scrolling="no" style="border:none;overflow:hidden;width:100%;" title="Posts from Instagram"></iframe></div>` : `<img class="lazy" src="placeholder.jpg" data-src="placeholder.jpg">`}
          <div class="bio">
            <p>(BIO goes here)</p>
            <div class="bio-socials">
              ${m.instagram ? `<a href="${m.instagram}" target="_blank" onclick="event.stopPropagation()">📷 Instagram</a>` : ""}
            </div>
          </div>
          <button class="toggle-bio">Read More</button>
        </li>`).join("");

      document.getElementById("member-count").textContent = `(${members.length})`;
      initCards();
      filterMembers();
    });

  function initCards() {
    /* Lazy loading */
    const lazyObs = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;
          if (img.dataset.src) {
            img.src = img.dataset.src;
            img.onload = () => img.classList.add("loaded");
            lazyObs.unobserve(img);
          }
        }
      });
    });
    document.querySelectorAll(".lazy").forEach(img => lazyObs.observe(img));

    /* Scroll animation */
    const scrollObs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); scrollObs.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll(".team li").forEach((card, i) => {
      card.style.transitionDelay = `${i * 0.07}s`;
      scrollObs.observe(card);
    });

    /* Toggle bio */
    document.querySelectorAll(".toggle-bio").forEach(btn => {
      btn.addEventListener("click", e => {
        e.stopPropagation();
        const bio = btn.closest("li").querySelector(".bio");
        const open = bio.style.display === "block";
        bio.style.display = open ? "none" : "block";
        btn.textContent = open ? "Read More" : "Read Less";
      });
    });

    /* Card navigation */
    document.querySelectorAll(".team li").forEach(card => {
      card.addEventListener("click", e => {
        if (e.target.closest("button") || e.target.tagName === "IMG" || e.target.tagName === "IFRAME") return;
        if (card.dataset.link) window.location.href = card.dataset.link;
      });
    });

    /* Lightbox */
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    document.querySelectorAll(".insta-carousel img").forEach(img => {
      img.addEventListener("click", e => {
        e.stopPropagation();
        lightboxImg.src = img.src;
        lightbox.style.display = "flex";
      });
    });
    lightbox.addEventListener("click", () => { lightbox.style.display = "none"; lightboxImg.src = ""; });
  }

  /* Hamburger */
  const hamburger = document.getElementById("hamburger");
  const mobileMenu = document.getElementById("mobile-menu");
  if (hamburger && mobileMenu) {
    hamburger.addEventListener("click", () => {
      mobileMenu.style.display = mobileMenu.style.display === "flex" ? "none" : "flex";
    });
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => { mobileMenu.style.display = 'none'; });
    });
  }

  /* Theme toggle */
  document.getElementById("theme-toggle").addEventListener("click", () => {
    document.body.classList.toggle("light");
    document.getElementById("theme-toggle").textContent = document.body.classList.contains("light") ? "☀️" : "🌙";
  });

});
</script>

<footer style="text-align:center;padding:2rem;color:rgba(255,255,255,0.35);font-size:0.8rem;position:relative;z-index:2;">
  © 2026 Marsudirini Photography Students · Made by <a href="https://github.com/Ivoryy06" target="_blank" style="color:rgba(255,255,255,0.5);text-decoration:none;">Ivory</a>
</footer>

<script>
let activeGen = 17;

function filterMembers() {
  const q = document.getElementById("search").value.toLowerCase();
  let visible = 0;
  document.querySelectorAll(".team li[data-gen]").forEach(card => {
    const matchGen = parseInt(card.dataset.gen) === activeGen;
    const matchSearch = card.querySelector("h3").textContent.toLowerCase().includes(q);
    card.style.display = (matchGen && matchSearch) ? "" : "none";
    if (matchGen && matchSearch) visible++;
  });
  document.getElementById("member-count").textContent = `(${visible})`;
}

document.querySelectorAll(".gen-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".gen-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeGen = parseInt(btn.dataset.gen);
    document.getElementById("active-gen").textContent = activeGen;
    filterMembers();
  });
});
</script>

</body>
</html>
