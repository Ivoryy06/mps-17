<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Linggar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/member-shared.css">
  <link rel="stylesheet" href="../css/member5.css">
</head>
<body>
  <div class="hero-bg"></div>
  <main class="member">
    <h1 class="member-title">Linggar</h1>
    <nav class="member-nav">
      <a href="../index.html">← Home</a>
      <button id="bio-toggle">Show Bio</button>
      <button id="contact-toggle">Contact</button>
    </nav>
    <p class="bio-text" id="bio-text">
      This is the member bio. Short description about who they are,
      what they do, or anything you want here.
    </p>
    <div class="gallery">
      <img src="../pictures/porto/member5/porto1.jpg" alt="Porto 1">
      <img src="../pictures/porto/member5/porto2.jpg" alt="Porto 2">
      <img src="../pictures/porto/member5/porto3.jpg" alt="Porto 3">
      <img src="../pictures/porto/member5/porto4.jpg" alt="Porto 4">
      <img src="../pictures/porto/member5/porto5.jpg" alt="Porto 5">
      <img src="../pictures/porto/member5/porto6.jpg" alt="Porto 6">
      <img src="../pictures/porto/member5/porto7.jpg" alt="Porto 7">
      <img src="../pictures/porto/member5/porto8.jpg" alt="Porto 8">
      <img src="../pictures/porto/member5/porto9.jpg" alt="Porto 9">
      <img src="../pictures/porto/member5/porto10.jpg" alt="Porto 10">
      <img src="../pictures/porto/member5/porto11.jpg" alt="Porto 11">
      <img src="../pictures/porto/member5/porto12.jpg" alt="Porto 12">
      <img src="../pictures/porto/member5/porto13.jpg" alt="Porto 13">
      <img src="../pictures/porto/member5/porto14.jpg" alt="Porto 14">
    </div>
    <div class="member-pagination"><a href="member4.html">← Member 4</a><span class="spacer"></span><a href="member6.html">Member 6 →</a></div>
  </main>

  <div class="lightbox" id="lightbox"><img id="lightbox-img" alt=""></div>

  <div class="popup" id="contact-popup">
    <div class="popup-content">
      <h2>Contact</h2>
      <div class="contact-socials">
        <a href="https://www.instagram.com/" target="_blank" aria-label="Instagram">
          <img src="../pictures/svg/instagram.svg" alt="Instagram">
        </a>
      </div>
      <button class="popup-close">Close</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      document.querySelectorAll(".gallery img").forEach(img => {
        img.addEventListener("click", () => { lightbox.style.display="flex"; lightboxImg.src=img.src; lightboxImg.alt=img.alt; });
      });
      lightbox.addEventListener("click", () => { lightbox.style.display="none"; lightboxImg.src=""; });

      const bioBtn = document.getElementById("bio-toggle");
      const bioText = document.getElementById("bio-text");
      bioBtn.addEventListener("click", () => {
        const v = bioText.style.display === "block";
        bioText.style.display = v ? "none" : "block";
        bioBtn.textContent = v ? "Show Bio" : "Hide Bio";
      });

      const contactPopup = document.getElementById("contact-popup");
      document.getElementById("contact-toggle").addEventListener("click", () => { contactPopup.style.display="flex"; });
      contactPopup.querySelector(".popup-close").addEventListener("click", () => { contactPopup.style.display="none"; });
      contactPopup.addEventListener("click", e => { if(e.target===contactPopup) contactPopup.style.display="none"; });
    });
  </script>
<script>
  document.querySelectorAll("a[href]").forEach(a => {
    const href = a.getAttribute("href");
    if (!href.startsWith("http") && !href.startsWith("#")) {
      a.addEventListener("click", e => {
        e.preventDefault();
        document.body.style.cssText += ";animation:pageFadeOut 0.25s ease forwards";
        setTimeout(() => location.href = href, 250);
      });
    }
  });
</script>
<style>@keyframes pageFadeOut{to{opacity:0;transform:translateY(-8px)}}</style>
</body>
</html>
