<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dennis Guan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Member CSS -->
  <link rel="stylesheet" href="member6.css?v=7">

  <style>
    /* ===== MEMBER PAGE SPECIFIC ===== */
    main.member {
      max-width: 1100px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .member-title {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1rem;
    }

    .bio-text {
      max-width: 600px;
      margin: 1rem auto 3rem;
      font-size: 1rem;
      line-height: 1.6;
      color: #ddd;
      text-align: center;
      display: none;
    }

    .member-nav {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 3rem;
    }

    .member-nav button,
    .member-nav a {
      font-size: 0.95rem;
      color: #fff;
      background: rgba(0,0,0,0.35);
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      backdrop-filter: blur(4px);
      transition: background 0.2s ease;
    }

    .member-nav button:hover,
    .member-nav a:hover {
      background: rgba(0,0,0,0.55);
    }

    /* Gallery Masonry */
    .gallery {
      column-count: 4;
      column-gap: 1rem;
    }

    .gallery img {
      width: 100%;
      display: block;
      margin-bottom: 1rem;
      border-radius: 8px;
      break-inside: avoid;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    /* ===== LIGHTBOX & POPUPS ===== */
    .lightbox,
    .popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 999;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
    }

    .popup-content {
      background: rgba(0,0,0,0.85);
      padding: 2rem;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
    }

    .popup-close {
      margin-top: 1rem;
      padding: 0.4rem 0.8rem;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .popup-close:hover {
      background: rgba(255,255,255,0.35);
    }

    .contact-socials {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 1rem 0;
    }

    .contact-socials a img {
      width: 32px;
      height: 32px;
      filter: invert(1);
      transition: transform 0.2s ease;
    }

    .contact-socials a:hover img {
      transform: scale(1.1);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) { .gallery { column-count: 3; } }
    @media (max-width: 768px) { .gallery { column-count: 2; } }
    @media (max-width: 480px) { .gallery { column-count: 1; } }

  </style>
</head>
<body>

  <!-- Hero glow/background -->
  <div class="hero-bg"></div>

  <main class="member">

    <!-- Member Name -->
    <h1 class="member-title">Dennis Guan</h1>

    <!-- Navigation Buttons -->
    <nav class="member-nav">
      <a href="../index.html">← Home</a>
      <button id="bio-toggle">Show Bio</button>
      <button id="contact-toggle">Contact</button>
    </nav>

    <!-- Bio Section -->
    <p class="bio-text" id="bio-text">
      This is the member bio. Short description about who they are,
      what they do, or anything you want here.
    </p>

    <!-- Gallery -->
    <div class="gallery">
      <img src="gallery/m1-1.jpg" alt="Gallery 1">
      <img src="gallery/m1-2.jpg" alt="Gallery 2">
      <img src="gallery/m1-3.jpg" alt="Gallery 3">
      <img src="gallery/m1-4.jpg" alt="Gallery 4">
      <img src="gallery/m1-5.jpg" alt="Gallery 5">
      <img src="gallery/m1-6.jpg" alt="Gallery 6">
    </div>

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" alt="">
  </div>

  <!-- Contact Popup -->
  <div class="popup" id="contact-popup">
    <div class="popup-content">
      <h2>Contact</h2>

      <div class="contact-socials">
        <a href="https://www.instagram.com/den_wipk?igsh=aTIyYXBsZ3FidXoz" target="_blank" aria-label="Instagram">
          <img src="instagram.svg" alt="Instagram">
        </a>
        <a href="https://twitter.com/USERNAME" target="_blank" aria-label="Twitter">
          <img src="twitter.svg" alt="Twitter">
        </a>
        <a href="https://github.com/USERNAME" target="_blank" aria-label="GitHub">
          <img src="github.svg" alt="GitHub">
        </a>
      </div>

      <button class="popup-close">Close</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      /* ===== LIGHTBOX ===== */
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");

      document.querySelectorAll(".gallery img").forEach(img => {
        img.addEventListener("click", () => {
          lightbox.style.display = "flex";
          lightboxImg.src = img.src;
          lightboxImg.alt = img.alt;
        });
      });

      lightbox.addEventListener("click", () => {
        lightbox.style.display = "none";
        lightboxImg.src = "";
        lightboxImg.alt = "";
      });

      /* ===== BIO TOGGLE ===== */
      const bioBtn = document.getElementById("bio-toggle");
      const bioText = document.getElementById("bio-text");

      bioBtn.addEventListener("click", () => {
        const visible = bioText.style.display === "block";
        bioText.style.display = visible ? "none" : "block";
        bioBtn.textContent = visible ? "Show Bio" : "Hide Bio";
      });

      /* ===== CONTACT POPUP ===== */
      const contactBtn = document.getElementById("contact-toggle");
      const contactPopup = document.getElementById("contact-popup");
      const contactClose = contactPopup.querySelector(".popup-close");

      contactBtn.addEventListener("click", () => {
        contactPopup.style.display = "flex";
      });

      contactClose.addEventListener("click", () => {
        contactPopup.style.display = "none";
      });

      contactPopup.addEventListener("click", (e) => {
        if (e.target === contactPopup) contactPopup.style.display = "none";
      });

    });
  </script>

</body>
</html>
