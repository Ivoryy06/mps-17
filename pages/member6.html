<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dennis Guan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Member CSS -->
  <link rel="stylesheet" href="member6.css?v=7">
  <link rel="stylesheet" href="../css/member-shared.css">
</head>
<body>

  <!-- Hero glow/background -->
  <div class="hero-bg"></div>

  <main class="member">

    <!-- Member Name -->
    <h1 class="member-title">Dennis Guan</h1>

    <!-- Navigation Buttons -->
    <nav class="member-nav">
      <a href="../index.html">← Home</a>
      <button id="bio-toggle">Show Bio</button>
      <button id="contact-toggle">Contact</button>
    </nav>

    <!-- Bio Section -->
    <p class="bio-text" id="bio-text">
      This is the member bio. Short description about who they are,
      what they do, or anything you want here.
    </p>

    <!-- Gallery -->
    <div class="gallery">
      <img src="gallery/m1-1.jpg" alt="Gallery 1">
      <img src="gallery/m1-2.jpg" alt="Gallery 2">
      <img src="gallery/m1-3.jpg" alt="Gallery 3">
      <img src="gallery/m1-4.jpg" alt="Gallery 4">
      <img src="gallery/m1-5.jpg" alt="Gallery 5">
      <img src="gallery/m1-6.jpg" alt="Gallery 6">
    </div>

    <div class="member-pagination"><a href="member5.html">← Member 5</a><span class="spacer"></span></div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" alt="">
  </div>

  <!-- Contact Popup -->
  <div class="popup" id="contact-popup">
    <div class="popup-content">
      <h2>Contact</h2>

      <div class="contact-socials">
        <a href="https://www.instagram.com/den_wipk?igsh=aTIyYXBsZ3FidXoz" target="_blank" aria-label="Instagram">
          <img src="instagram.svg" alt="Instagram">
        </a>
        <a href="https://twitter.com/USERNAME" target="_blank" aria-label="Twitter">
          <img src="twitter.svg" alt="Twitter">
        </a>
        <a href="https://github.com/USERNAME" target="_blank" aria-label="GitHub">
          <img src="github.svg" alt="GitHub">
        </a>
      </div>

      <button class="popup-close">Close</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      /* ===== LIGHTBOX ===== */
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");

      document.querySelectorAll(".gallery img").forEach(img => {
        img.addEventListener("click", () => {
          lightbox.style.display = "flex";
          lightboxImg.src = img.src;
          lightboxImg.alt = img.alt;
        });
      });

      lightbox.addEventListener("click", () => {
        lightbox.style.display = "none";
        lightboxImg.src = "";
        lightboxImg.alt = "";
      });

      /* ===== BIO TOGGLE ===== */
      const bioBtn = document.getElementById("bio-toggle");
      const bioText = document.getElementById("bio-text");

      bioBtn.addEventListener("click", () => {
        const visible = bioText.style.display === "block";
        bioText.style.display = visible ? "none" : "block";
        bioBtn.textContent = visible ? "Show Bio" : "Hide Bio";
      });

      /* ===== CONTACT POPUP ===== */
      const contactBtn = document.getElementById("contact-toggle");
      const contactPopup = document.getElementById("contact-popup");
      const contactClose = contactPopup.querySelector(".popup-close");

      contactBtn.addEventListener("click", () => {
        contactPopup.style.display = "flex";
      });

      contactClose.addEventListener("click", () => {
        contactPopup.style.display = "none";
      });

      contactPopup.addEventListener("click", (e) => {
        if (e.target === contactPopup) contactPopup.style.display = "none";
      });

    });
  </script>

<script>
  document.querySelectorAll("a[href]").forEach(a => {
    const href = a.getAttribute("href");
    if (!href.startsWith("http") && !href.startsWith("#")) {
      a.addEventListener("click", e => {
        e.preventDefault();
        document.body.style.cssText += ";animation:pageFadeOut 0.25s ease forwards";
        setTimeout(() => location.href = href, 250);
      });
    }
  });
</script>
<style>@keyframes pageFadeOut{to{opacity:0;transform:translateY(-8px)}}</style>
</body>
</html>
